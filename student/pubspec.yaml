name: student
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  # This is the corrected Dart SDK version.
  # It specifies a valid range for your Flutter SDK.
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.18.1

  # State management for your app's data
  provider: ^6.0.5

  # For making HTTP requests to your backend API
  http: ^0.13.5

  # For storing simple data like the user's login token
  shared_preferences: ^2.2.2

  # For picking event posters from the gallery
  image_picker: ^1.1.0

  # For displaying charts on the analytics screen
  fl_chart: ^0.68.0

  # Add these missing dependencies
  path: ^1.8.3
  async: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # I added the icon package here!
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# I added the configuration for your new logo here at the very bottom!
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21